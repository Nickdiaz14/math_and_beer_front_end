<main>
        <h1 class="title">¡Elige un juego!</h1>
        <div *ngIf="loading" class="loader">
            <div class="spinner"></div>
            <span>Cargando rankings...</span>
        </div>
        <div *ngIf="!loading" class="displayColumn">
            <select [(ngModel)]="game" id="game" name="game" required (change)="filterRecords()" class="game_select">
                <option value="" disabled selected>Selecciona un juego</option>
                <option *ngFor="let game of games" [value]="game">{{game}}</option>
            </select> 
        </div>
        <p *ngIf="!loading" class="record_count displayColumn">
            {{selectedGame[0].leaderboard.length === 0 ? 'No hay records disponibles.' : selectedGame[0].leaderboard.length + ' records encontrados.'}}
        </p>
        <hr class="displayColumn">
        <section class="displayColumn" *ngIf="game">
            <div id="leaderboard" class="leaderboard">
                <table>
                    <thead>
                        <tr>
                            <th>Posición</th>
                            <th>Jugador</th>
                            <th>Record</th>
                        </tr>
                    </thead>
                    <tr *ngFor="let score of selectedGame[0].leaderboard.slice(0, 10)">
                        <td>{{score.position}}</td>
                        <td>{{score.username}}</td>
                        <td>{{score.record}}</td>
                    </tr>
                </table>
            </div>
        </section>
</main>
